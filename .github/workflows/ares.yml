name: Build Kernel CI ARES

on:
  workflow_dispatch:
  push:
jobs:
  build:
    name: Build Xiaomi ARES Kernel
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev \
          g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev \
          squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven \
          libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl \
          libxml-simple-perl bc libc6-dev-i386 libx11-dev lib32z-dev \
          libgl1-mesa-dev xsltproc unzip device-tree-compiler

    - name: Download Toolchains
      run: |
        # Create a directory for all toolchains
        mkdir -p $GITHUB_WORKSPACE/toolchains
        cd $GITHUB_WORKSPACE/toolchains

        # Clone Proton Clang toolchain
        echo "Downloading Proton Clang..."
        git clone --depth=1 https://github.com/kdrag0n/proton-clang proton-clang

    - name: Clone kernel source
      run: |
        git clone --branch lxr --depth 1 https://github.com/Tkpointz/android_kernel_aresin.git

    - name: Build Kernel
      run: |
        # Set environment variables for the build
        export KBUILD_BUILD_USER="GitHub"
        export KBUILD_BUILD_HOST="Actions"
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH="$GITHUB_WORKSPACE/toolchains/proton-clang/bin:$PATH"
        
        # Change to kernel source directory
        cd android_kernel_aresin

        # Build command based on the reference config
        # This includes setting the defconfig and then compiling with Proton Clang (full LLVM, no GCC)
        make -j$(nproc) O=out \
             CC=clang \
             CLANG_TRIPLE=aarch64-linux-gnu- \
             CROSS_COMPILE=aarch64-linux-gnu- \
             CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
             AR=llvm-ar \
             NM=llvm-nm \
             OBJCOPY=llvm-objcopy \
             OBJDUMP=llvm-objdump \
             STRIP=llvm-strip \
             aresin_defconfig

        make -j$(nproc) O=out \
             CC=clang \
             CLANG_TRIPLE=aarch64-linux-gnu- \
             CROSS_COMPILE=aarch64-linux-gnu- \
             CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
             AR=llvm-ar \
             NM=llvm-nm \
             OBJCOPY=llvm-objcopy \
             OBJDUMP=llvm-objdump \
             STRIP=llvm-strip

    - name: Build Custom Kernel Module
      run: |
        # Set the same environment variables as the kernel build
        export KBUILD_BUILD_USER="GitHub"
        export KBUILD_BUILD_HOST="Actions"
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH="$GITHUB_WORKSPACE/toolchains/proton-clang/bin:$PATH"

        # Build the external module
        # -C: 指向内核源码的输出目录 (O=out)
        # M=: 指向你的模块源码目录 (包含 Makefile 的地方)
        # modules: 是构建模块的目标
        make -j$(nproc) -C android_kernel_aresin/out \
             M=$GITHUB_WORKSPACE/kernel \
             CC=clang \
             CLANG_TRIPLE=aarch64-linux-gnu- \
             CROSS_COMPILE=aarch64-linux-gnu- \
             CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
             AR=llvm-ar \
             NM=llvm-nm \
             OBJCOPY=llvm-objcopy \
             OBJDUMP=llvm-objdump \
             STRIP=llvm-strip \
             modules

    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Image-begonia
        path: android_kernel_aresin/out/arch/arm64/boot/Image.gz
    - name: Upload Kernel Module
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Module-khack
        # 编译后的 .ko 文件会生成在你的模块源码目录中
        path: kernel/khack.ko
